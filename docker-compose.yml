version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: wardrobe_postgres
    environment:
      POSTGRES_DB: wardrobe
      POSTGRES_USER: wardrobe_user
      POSTGRES_PASSWORD: wardrobe_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: wardrobe_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: wardrobe_minio
      MINIO_ROOT_PASSWORD: wardrobe_minio_secret
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web UI (браузер)
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
