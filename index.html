<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WARDROBE.AI — Virtual Try-On</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0d0b;
      --surface: #161512;
      --surface2: #1e1c18;
      --surface3: #27241f;
      --border: #2e2b25;
      --border2: #3d3930;
      --gold: #c9a84c;
      --gold-light: #e2c87a;
      --gold-dim: #7a6530;
      --cream: #f0ead8;
      --cream-dim: #9c9484;
      --text: #e8e0cc;
      --text-muted: #6b6456;
      --accent: #b87333;
      --success: #5c8c6a;
      --error: #8c4a4a;
      --font-display: 'Cormorant Garamond', serif;
      --font-mono: 'DM Mono', monospace;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-display); }
    #root { height: 100%; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.08); opacity: 0.2; }
      100% { transform: scale(1); opacity: 0.6; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes scan {
      0% { top: 0%; }
      100% { top: 100%; }
    }
    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(201,168,76,0.15); }
      50% { box-shadow: 0 0 40px rgba(201,168,76,0.35); }
    }

    .app {
      display: grid;
      grid-template-rows: 64px 1fr;
      grid-template-columns: 260px 1fr 320px;
      height: 100vh;
      overflow: hidden;
    }

    /* ---- HEADER ---- */
    .header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      z-index: 10;
    }
    .header-logo {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 0.25em;
      color: var(--cream);
    }
    .header-logo span { color: var(--gold); font-weight: 600; }
    .header-nav { display: flex; gap: 28px; }
    .header-nav a {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.2s;
      cursor: pointer;
    }
    .header-nav a:hover, .header-nav a.active { color: var(--gold); }
    .header-user {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--cream-dim);
    }
    .avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-dim), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: var(--cream); font-weight: 600;
    }

    /* ---- SIDEBAR LEFT ---- */
    .sidebar-left {
      border-right: 1px solid var(--border);
      background: var(--surface);
      overflow-y: auto;
      overflow-x: hidden;
      padding: 20px 0 16px;
      animation: fadeUp 0.4s ease both;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* ---- Category section with horizontal scroll ---- */
    .category-section {
      margin-bottom: 4px;
    }
    .category-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px 8px;
      position: relative;
    }
    .category-label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .category-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-top    { background: var(--gold); }
    .dot-bottom { background: var(--accent); }
    .dot-outer  { background: var(--success); }

    .category-count {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--border2);
      letter-spacing: 0.05em;
    }

    /* Horizontal scroll track */
    .h-scroll-track {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 4px 16px 10px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .h-scroll-track::-webkit-scrollbar { display: none; }

    /* Card item in horizontal scroll */
    .card-item {
      flex-shrink: 0;
      width: 82px;
      scroll-snap-align: start;
      cursor: pointer;
      position: relative;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      transition: border-color 0.18s, background 0.18s, transform 0.15s;
      overflow: hidden;
      user-select: none;
    }
    .card-item:hover {
      border-color: var(--border2);
      background: var(--surface3);
      transform: translateY(-2px);
    }
    .card-item.selected {
      border-color: var(--gold);
      background: var(--surface3);
      box-shadow: 0 0 12px rgba(201,168,76,0.18);
    }
    .card-item.selected-top    { border-color: var(--gold); box-shadow: 0 0 10px rgba(201,168,76,0.18); }
    .card-item.selected-bottom { border-color: var(--accent); box-shadow: 0 0 10px rgba(184,115,51,0.18); }
    .card-item.selected-outer  { border-color: var(--success); box-shadow: 0 0 10px rgba(92,140,106,0.18); }

    /* Checkmark badge on selected */
    .card-check {
      position: absolute;
      top: 5px; right: 5px;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-size: 9px;
      color: var(--bg);
      font-weight: 700;
      opacity: 0;
      transform: scale(0.5);
      transition: opacity 0.2s, transform 0.2s;
      z-index: 2;
    }
    .card-item.selected .card-check { opacity: 1; transform: scale(1); }
    .card-item.selected-bottom .card-check { background: var(--accent); }
    .card-item.selected-outer  .card-check { background: var(--success); }

    .card-thumb {
      width: 100%;
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      background: var(--surface3);
      border-radius: 6px 6px 0 0;
    }
    .card-body {
      padding: 6px 7px 7px;
    }
    .card-name {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 400;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.2;
    }
    .card-meta {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Add card button */
    .card-add {
      flex-shrink: 0;
      width: 82px;
      height: 126px;
      scroll-snap-align: start;
      border-radius: 8px;
      border: 1.5px dashed var(--border2);
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 10px;
    }
    .card-add:hover {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(201,168,76,0.03);
    }
    .card-add-icon { font-size: 20px; }

    /* Separator between categories */
    .cat-divider {
      height: 1px;
      background: var(--border);
      margin: 4px 16px 10px;
    }

    /* Selected outfit summary bar */
    .outfit-summary {
      margin: 0 16px 12px;
      padding: 10px 14px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .outfit-summary-title {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    .outfit-summary-items {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }
    .outfit-tag {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 12px;
      font-family: var(--font-mono);
      font-size: 9px;
      border: 1px solid;
    }
    .tag-top    { border-color: rgba(201,168,76,0.3); color: var(--gold); background: rgba(201,168,76,0.06); }
    .tag-bottom { border-color: rgba(184,115,51,0.3); color: var(--accent); background: rgba(184,115,51,0.06); }
    .tag-outer  { border-color: rgba(92,140,106,0.3); color: var(--success); background: rgba(92,140,106,0.06); }
    .tag-remove {
      cursor: pointer;
      opacity: 0.5;
      font-size: 10px;
      margin-left: 2px;
      line-height: 1;
    }
    .tag-remove:hover { opacity: 1; }

    /* Sidebar total count label */
    .sidebar-section-title {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      text-transform: uppercase;
      padding: 0 16px 14px;
    }

    /* Legacy – keep badge classes for right sidebar */
    .category-badge {
      font-family: var(--font-mono);
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 2px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .badge-top { background: rgba(201,168,76,0.1); color: var(--gold); }
    .badge-bottom { background: rgba(184,115,51,0.1); color: var(--accent); }
    .badge-outer { background: rgba(92,140,106,0.1); color: var(--success); }

    .upload-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 4px 16px 0;
      padding: 10px 16px;
      background: transparent;
      border: 1px dashed var(--border2);
      border-radius: 6px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
      width: calc(100% - 32px);
      justify-content: center;
    }
    .upload-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(201,168,76,0.04);
    }

    /* ---- MAIN ---- */
    .main {
      display: flex;
      flex-direction: column;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    .main-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
    }
    .toolbar-title {
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--cream-dim);
      font-family: var(--font-mono);
      text-transform: uppercase;
    }
    .toolbar-actions { display: flex; gap: 8px; }
    .btn {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      padding: 8px 18px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      text-transform: uppercase;
    }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--text-muted);
    }
    .btn-ghost:hover { border-color: var(--gold-dim); color: var(--cream-dim); }
    .btn-primary {
      background: linear-gradient(135deg, var(--gold-dim), var(--gold));
      color: var(--bg);
      font-weight: 500;
    }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      filter: none;
    }

    /* ---- CANVAS AREA ---- */
    .canvas-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Background grid */
    .canvas-area::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .avatar-stage {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeUp 0.5s 0.1s ease both;
    }

    .avatar-frame {
      width: 200px;
      height: 320px;
      border-radius: 100px 100px 60px 60px;
      border: 1px solid var(--border2);
      background: var(--surface);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: glowPulse 3s ease-in-out infinite;
    }

    .avatar-body {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Avatar silhouette drawn with CSS */
    .avatar-head {
      width: 70px; height: 70px;
      border-radius: 50%;
      background: linear-gradient(160deg, #3d3530, #2a2520);
      border: 1px solid var(--border2);
      margin-top: 28px;
      flex-shrink: 0;
      position: relative;
    }
    .avatar-head::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px; height: 12px;
      border-radius: 0 0 20px 20px;
      background: #2a2520;
    }

    .avatar-torso {
      width: 90px;
      flex: 1;
      margin-top: 6px;
      border-radius: 8px 8px 18px 18px;
      position: relative;
      background: var(--surface2);
      border: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.5s, border-color 0.3s;
    }

    .avatar-legs {
      display: flex;
      gap: 6px;
      width: 90px;
      margin-bottom: 10px;
    }
    .avatar-leg {
      flex: 1;
      height: 100px;
      border-radius: 4px 4px 10px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      transition: background 0.5s, border-color 0.3s;
    }

    /* Clothing overlay on avatar */
    .clothing-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .clothing-overlay.visible { opacity: 1; }

    /* Scan animation during try-on */
    .scan-line {
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      animation: scan 1.2s ease-in-out infinite;
      display: none;
      z-index: 5;
    }
    .scanning .scan-line { display: block; }

    .avatar-label {
      margin-top: 16px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* Outfit chips below avatar */
    .outfit-chips {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 280px;
    }
    .outfit-chip {
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .chip-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      animation: fadeUp 0.6s ease both;
    }
    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.3;
    }
    .empty-title {
      font-size: 20px;
      font-weight: 300;
      color: var(--cream-dim);
      letter-spacing: 0.05em;
    }
    .empty-sub {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    /* ---- SIDEBAR RIGHT ---- */
    .sidebar-right {
      border-left: 1px solid var(--border);
      background: var(--surface);
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      animation: fadeUp 0.4s 0.05s ease both;
    }

    .panel-title {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    /* Upload zone */
    .upload-zone {
      border: 1px dashed var(--border2);
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--gold);
      background: rgba(201,168,76,0.04);
    }
    .upload-zone input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }
    .upload-icon { font-size: 28px; margin-bottom: 8px; }
    .upload-text {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .upload-text strong { color: var(--gold); font-weight: 500; }

    /* Progress */
    .progress-bar {
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      overflow: hidden;
      margin-top: 8px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold));
      border-radius: 1px;
      transition: width 0.3s ease;
    }

    /* Analysis panel */
    .analysis-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    .analysis-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }
    .analysis-row:last-child { border-bottom: none; }
    .analysis-key {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .analysis-val {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--cream);
    }

    /* AI result */
    .tryon-result {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      overflow: hidden;
    }
    .tryon-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .tryon-title {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--cream);
      letter-spacing: 0.05em;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
    }
    .dot-idle { background: var(--border2); }
    .dot-processing { background: var(--gold); animation: pulse-ring 1s ease infinite; }
    .dot-done { background: var(--success); }

    .tryon-body { padding: 16px; }
    .tryon-preview {
      width: 100%;
      aspect-ratio: 3/4;
      background: var(--surface3);
      border-radius: 6px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      margin-bottom: 12px;
    }

    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .score-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }
    .score-label {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      flex: 1;
    }
    .score-bar {
      flex: 2;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .score-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold));

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback, useMemo } = React;

    // ─────────────────────────────────────────────────────────────
    // BG REMOVAL via Canvas + Claude Vision API
    // Strategy: send image to Claude, get bounding box + dominant
    // colour of background, then use canvas to create a mask.
    // ─────────────────────────────────────────────────────────────
    async function removeBackground(imageDataUrl, onStep) {
      onStep('detect');

      // Convert dataURL to base64
      const base64 = imageDataUrl.split(',')[1];
      const mimeType = imageDataUrl.split(';')[0].split(':')[1];

      // Ask Claude Vision to describe clothing bounds and bg color
      let claudeResult = null;
      try {
        const resp = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 400,
            messages: [{
              role: 'user',
              content: [
                {
                  type: 'image',
                  source: { type: 'base64', media_type: mimeType, data: base64 }
                },
                {
                  type: 'text',
                  text: `Analyze this clothing image. Respond ONLY with a JSON object, no markdown:
{
  "category": "top" | "bottom" | "outer",
  "garmentName": "short descriptive name",
  "dominantGarmentColor": "#rrggbb hex",
  "bgIsWhite": true/false,
  "bgColor": "#rrggbb approximate background color",
  "garmentBounds": { "xPct": 0-100, "yPct": 0-100, "wPct": 0-100, "hPct": 0-100 }
}`
                }
              ]
            }]
          })
        });
        const data = await resp.json();
        const text = data.content?.map(b => b.text || '').join('');
        const clean = text.replace(/```json|```/g, '').trim();
        claudeResult = JSON.parse(clean);
      } catch(e) {
        // Fallback if API fails
        claudeResult = {
          category: 'top', garmentName: 'Clothing Item',
          dominantGarmentColor: '#c9a84c', bgIsWhite: true,
          bgColor: '#ffffff',
          garmentBounds: { xPct: 10, yPct: 5, wPct: 80, hPct: 90 }
        };
      }

      onStep('segment');

      // Draw on canvas and remove background
      const removedDataUrl = await canvasRemoveBg(imageDataUrl, claudeResult);

      onStep('done');
      return { removedDataUrl, meta: claudeResult };
    }

    function canvasRemoveBg(imageDataUrl, meta) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width  = img.width;
          canvas.height = img.height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);

          const { data, width, height } = ctx.getImageData(0, 0, canvas.width, canvas.height);

          // Parse target bg color
          const bgHex = meta.bgColor || '#ffffff';
          const bgR = parseInt(bgHex.slice(1,3), 16);
          const bgG = parseInt(bgHex.slice(3,5), 16);
          const bgB = parseInt(bgHex.slice(5,7), 16);

          // Garment bounding box in pixels
          const b = meta.garmentBounds;
          const gx1 = Math.floor((b.xPct / 100) * width);
          const gy1 = Math.floor((b.yPct / 100) * height);
          const gx2 = Math.floor(((b.xPct + b.wPct) / 100) * width);
          const gy2 = Math.floor(((b.yPct + b.hPct) / 100) * height);

          const threshold = meta.bgIsWhite ? 40 : 55;

          for (let i = 0; i < data.length; i += 4) {
            const px = (i / 4) % width;
            const py = Math.floor((i / 4) / width);

            const r = data[i], g = data[i+1], b2 = data[i+2];

            // Outside garment bounding box → aggressively remove
            const inBounds = px >= gx1 && px <= gx2 && py >= gy1 && py <= gy2;

            const distBg = Math.sqrt(
              (r - bgR)**2 + (g - bgG)**2 + (b2 - bgB)**2
            );

            // Pixels close to bg color → transparent
            const thr = inBounds ? threshold : threshold * 0.6;
            if (distBg < thr) {
              data[i + 3] = 0; // transparent
            } else if (!inBounds) {
              // Outside bounds but not bg color → semi-transparent edge
              data[i + 3] = Math.max(0, data[i + 3] - 80);
            }
          }

          ctx.putImageData(new ImageData(data, width, height), 0, 0);
          resolve(canvas.toDataURL('image/png'));
        };
        img.src = imageDataUrl;
      });
    }

    // ─────────────────────────────────────────────────────────────
    // DATA
    // ─────────────────────────────────────────────────────────────
    const INITIAL_WARDROBE = [
      { id: 1, name: 'Silk Blouse',    category: 'top',    emoji: '👚', brand: 'Zara',     size: 'M',  photo: null, removedBg: null },
      { id: 2, name: 'Cotton Tee',     category: 'top',    emoji: '👕', brand: 'H&M',      size: 'M',  photo: null, removedBg: null },
      { id: 3, name: 'Knit Sweater',   category: 'top',    emoji: '🧥', brand: 'COS',      size: 'L',  photo: null, removedBg: null },
      { id: 4, name: 'Linen Blazer',   category: 'outer',  emoji: '🥼', brand: 'Massimo',  size: 'M',  photo: null, removedBg: null },
      { id: 5, name: 'Trench Coat',    category: 'outer',  emoji: '🧥', brand: 'Burberry', size: 'M',  photo: null, removedBg: null },
      { id: 6, name: 'Wool Trousers',  category: 'bottom', emoji: '👖', brand: 'Uniqlo',   size: '30', photo: null, removedBg: null },
      { id: 7, name: 'Midi Skirt',     category: 'bottom', emoji: '👗', brand: 'Mango',    size: 'S',  photo: null, removedBg: null },
      { id: 8, name: 'Slim Jeans',     category: 'bottom', emoji: '👖', brand: "Levi's",   size: '32', photo: null, removedBg: null },
    ];

    const CATEGORIES = [
      { key: 'top',    label: 'Tops',      dotClass: 'dot-top',    tagClass: 'tag-top',    selectedClass: 'selected-top'    },
      { key: 'outer',  label: 'Outerwear', dotClass: 'dot-outer',  tagClass: 'tag-outer',  selectedClass: 'selected-outer'  },
      { key: 'bottom', label: 'Bottoms',   dotClass: 'dot-bottom', tagClass: 'tag-bottom', selectedClass: 'selected-bottom' },
    ];

    // ─────────────────────────────────────────────────────────────
    // APP COMPONENT
    // ─────────────────────────────────────────────────────────────
    function App() {
      const [wardrobe, setWardrobe] = useState(INITIAL_WARDROBE);
      const [selected, setSelected] = useState({ top: null, outer: null, bottom: null });
      const [uploadModal, setUploadModal] = useState(false);
      const [toast, setToast] = useState(null);

      const showToast = (msg) => {
        setToast(msg);
        setTimeout(() => setToast(null), 3000);
      };

      const toggleItem = (item) => {
        setSelected(prev => ({
          ...prev,
          [item.category]: prev[item.category]?.id === item.id ? null : item
        }));
      };

      const selectedOutfit = Object.values(selected).filter(Boolean);

      return (
        <div className="app">
          {/* HEADER */}
          <div className="header">
            <div className="header-logo">WARDROBE<span>.AI</span></div>
            <div className="header-nav">
              <a href="#" className="active">Studio</a>
              <a href="#">History</a>
              <a href="#">Settings</a>
            </div>
            <div className="header-user">
              <span>Dinmukhammed</span>
              <div className="avatar">D</div>
            </div>
          </div>

          {/* SIDEBAR LEFT */}
          <div className="sidebar-left">
            {CATEGORIES.map(cat => (
              <div key={cat.key}>
                <div className="category-section">
                  <div className="category-header">
                    <div className="category-label">
                      <div className={`category-dot ${cat.dotClass}`}></div>
                      {cat.label}
                    </div>
                    <div className="category-count">{wardrobe.filter(w => w.category === cat.key).length}</div>
                  </div>
                  <div className="h-scroll-track">
                    {wardrobe.filter(w => w.category === cat.key).map(item => (
                      <div
                        key={item.id}
                        className={`card-item ${selected[cat.key]?.id === item.id ? cat.selectedClass : ''}`}
                        onClick={() => toggleItem(item)}
                      >
                        <div className="card-check">✓</div>
                        <div className="card-thumb">{item.emoji}</div>
                        <div className="card-body">
                          <div className="card-name">{item.name}</div>
                          <div className="card-meta">{item.brand}</div>
                        </div>
                      </div>
                    ))}
                    <div className="card-add" onClick={() => setUploadModal(true)}>
                      <div className="card-add-icon">+</div>
                      <div>Add</div>
                    </div>
                  </div>
                </div>
                {CATEGORIES.indexOf(cat) < CATEGORIES.length - 1 && <div className="cat-divider"></div>}
              </div>
            ))}

            {selectedOutfit.length > 0 && (
              <div className="outfit-summary">
                <div className="outfit-summary-title">Selected Outfit</div>
                <div className="outfit-summary-items">
                  {selectedOutfit.map(item => (
                    <div key={item.id} className={`outfit-tag ${item.category === 'top' ? 'tag-top' : item.category === 'bottom' ? 'tag-bottom' : 'tag-outer'}`}>
                      {item.emoji} {item.name}
                      <span className="tag-remove" onClick={() => setSelected(p => ({...p, [item.category]: null}))}>×</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            <button className="upload-btn" onClick={() => setUploadModal(true)}>📸 Upload Photo</button>
          </div>

          {/* MAIN CANVAS */}
          <div className="main">
            <div className="main-toolbar">
              <div className="toolbar-title">Virtual Try-On Studio</div>
              <div className="toolbar-actions">
                <button className="btn btn-ghost" onClick={() => setSelected({ top: null, outer: null, bottom: null })}>Clear</button>
                <button className="btn btn-primary" disabled={selectedOutfit.length === 0}>Generate Try-On</button>
              </div>
            </div>
            <div className="canvas-area">
              {selectedOutfit.length === 0 ? (
                <div className="empty-state">
                  <div className="empty-icon">👗</div>
                  <div className="empty-title">Select Items to Try</div>
                  <div className="empty-sub">Choose clothing from the left to see your virtual try-on</div>
                </div>
              ) : (
                <div className="avatar-stage">
                  <div className="avatar-frame">
                    <div className="avatar-body">
                      <div className="avatar-head"></div>
                      <div className="avatar-torso">
                        {selected.top && <div className="clothing-overlay visible">{selected.top.emoji}</div>}
                        {selected.outer && <div className="clothing-overlay visible" style={{fontSize: '32px'}}>{selected.outer.emoji}</div>}
                      </div>
                      <div className="avatar-legs">
                        <div className="avatar-leg"></div>
                        <div className="avatar-leg"></div>
                        {selected.bottom && <div className="clothing-overlay visible" style={{position: 'absolute', bottom: '10px'}}>{selected.bottom.emoji}</div>}
                      </div>
                    </div>
                  </div>
                  <div className="outfit-chips">
                    {selectedOutfit.map(item => (
                      <div key={item.id} className="outfit-chip">
                        <div className="chip-dot"></div>
                        {item.name}
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>

          {/* SIDEBAR RIGHT */}
          <div className="sidebar-right">
            <div>
              <div className="panel-title">Upload Clothing</div>
              <div className="upload-zone">
                <input type="file" accept="image/*" />
                <div className="upload-icon">📸</div>
                <div className="upload-text">
                  Drag photo or <strong>click</strong>
                </div>
              </div>
            </div>

            {selectedOutfit.length > 0 && (
              <div>
                <div className="panel-title">Outfit Analysis</div>
                <div className="analysis-card">
                  <div className="analysis-row">
                    <span className="analysis-key">Fit Score</span>
                    <span className="analysis-val">85/100</span>
                  </div>
                  <div className="analysis-row">
                    <span className="analysis-key">Style Score</span>
                    <span className="analysis-val">92/100</span>
                  </div>
                  <div className="analysis-row">
                    <span className="analysis-key">Items</span>
                    <span className="analysis-val">{selectedOutfit.length}</span>
                  </div>
                </div>
              </div>
            )}
          </div>

          {/* TOAST */}
          {toast && <div className="toast"><div className="toast-icon">✓</div> {toast}</div>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
