<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WARDROBE.AI — Virtual Try-On</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0d0b;
      --surface: #161512;
      --surface2: #1e1c18;
      --surface3: #27241f;
      --border: #2e2b25;
      --border2: #3d3930;
      --gold: #c9a84c;
      --gold-light: #e2c87a;
      --gold-dim: #7a6530;
      --cream: #f0ead8;
      --cream-dim: #9c9484;
      --text: #e8e0cc;
      --text-muted: #6b6456;
      --accent: #b87333;
      --success: #5c8c6a;
      --error: #8c4a4a;
      --font-display: 'Cormorant Garamond', serif;
      --font-mono: 'DM Mono', monospace;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-display); }
    #root { height: 100%; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.08); opacity: 0.2; }
      100% { transform: scale(1); opacity: 0.6; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes scan {
      0% { top: 0%; }
      100% { top: 100%; }
    }
    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(201,168,76,0.15); }
      50% { box-shadow: 0 0 40px rgba(201,168,76,0.35); }
    }

    .app {
      display: grid;
      grid-template-rows: 64px 1fr;
      grid-template-columns: 260px 1fr 320px;
      height: 100vh;
      overflow: hidden;
    }

    /* ---- HEADER ---- */
    .header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      z-index: 10;
    }
    .header-logo {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 0.25em;
      color: var(--cream);
    }
    .header-logo span { color: var(--gold); font-weight: 600; }
    .header-nav { display: flex; gap: 28px; }
    .header-nav a {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.2s;
      cursor: pointer;
    }
    .header-nav a:hover, .header-nav a.active { color: var(--gold); }
    .header-user {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--cream-dim);
    }
    .avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-dim), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: var(--cream); font-weight: 600;
    }

    /* ---- SIDEBAR LEFT ---- */
    .sidebar-left {
      border-right: 1px solid var(--border);
      background: var(--surface);
      overflow-y: auto;
      overflow-x: hidden;
      padding: 20px 0 16px;
      animation: fadeUp 0.4s ease both;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* ---- Category section with horizontal scroll ---- */
    .category-section {
      margin-bottom: 4px;
    }
    .category-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px 8px;
      position: relative;
    }
    .category-label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .category-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-top    { background: var(--gold); }
    .dot-bottom { background: var(--accent); }
    .dot-outer  { background: var(--success); }

    .category-count {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--border2);
      letter-spacing: 0.05em;
    }

    /* Horizontal scroll track */
    .h-scroll-track {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 4px 16px 10px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .h-scroll-track::-webkit-scrollbar { display: none; }

    /* Card item in horizontal scroll */
    .card-item {
      flex-shrink: 0;
      width: 82px;
      scroll-snap-align: start;
      cursor: pointer;
      position: relative;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      transition: border-color 0.18s, background 0.18s, transform 0.15s;
      overflow: hidden;
      user-select: none;
    }
    .card-item:hover {
      border-color: var(--border2);
      background: var(--surface3);
      transform: translateY(-2px);
    }
    .card-item.selected {
      border-color: var(--gold);
      background: var(--surface3);
      box-shadow: 0 0 12px rgba(201,168,76,0.18);
    }
    .card-item.selected-top    { border-color: var(--gold); box-shadow: 0 0 10px rgba(201,168,76,0.18); }
    .card-item.selected-bottom { border-color: var(--accent); box-shadow: 0 0 10px rgba(184,115,51,0.18); }
    .card-item.selected-outer  { border-color: var(--success); box-shadow: 0 0 10px rgba(92,140,106,0.18); }

    /* Checkmark badge on selected */
    .card-check {
      position: absolute;
      top: 5px; right: 5px;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-size: 9px;
      color: var(--bg);
      font-weight: 700;
      opacity: 0;
      transform: scale(0.5);
      transition: opacity 0.2s, transform 0.2s;
      z-index: 2;
    }
    .card-item.selected .card-check { opacity: 1; transform: scale(1); }
    .card-item.selected-bottom .card-check { background: var(--accent); }
    .card-item.selected-outer  .card-check { background: var(--success); }

    .card-delete {
      position: absolute;
      bottom: 5px; right: 5px;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--error);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
      color: var(--bg);
      font-weight: 700;
      opacity: 0;
      transform: scale(0.5);
      transition: opacity 0.2s, transform 0.2s;
      cursor: pointer;
      z-index: 2;
    }
    .card-item:hover .card-delete { opacity: 1; transform: scale(1); }
    .card-delete:hover { filter: brightness(1.15); }

    .card-thumb {
      width: 100%;
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      background: var(--surface3);
      border-radius: 6px 6px 0 0;
    }
    .card-body {
      padding: 6px 7px 7px;
    }
    .card-name {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 400;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.2;
    }
    .card-meta {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Add card button */
    .card-add {
      flex-shrink: 0;
      width: 82px;
      height: 126px;
      scroll-snap-align: start;
      border-radius: 8px;
      border: 1.5px dashed var(--border2);
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 10px;
    }
    .card-add:hover {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(201,168,76,0.03);
    }
    .card-add-icon { font-size: 20px; }

    /* Separator between categories */
    .cat-divider {
      height: 1px;
      background: var(--border);
      margin: 4px 16px 10px;
    }

    /* Selected outfit summary bar */
    .outfit-summary {
      margin: 0 16px 12px;
      padding: 10px 14px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .outfit-summary-title {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    .outfit-summary-items {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }
    .outfit-tag {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 12px;
      font-family: var(--font-mono);
      font-size: 9px;
      border: 1px solid;
    }
    .tag-top    { border-color: rgba(201,168,76,0.3); color: var(--gold); background: rgba(201,168,76,0.06); }
    .tag-bottom { border-color: rgba(184,115,51,0.3); color: var(--accent); background: rgba(184,115,51,0.06); }
    .tag-outer  { border-color: rgba(92,140,106,0.3); color: var(--success); background: rgba(92,140,106,0.06); }
    .tag-remove {
      cursor: pointer;
      opacity: 0.5;
      font-size: 10px;
      margin-left: 2px;
      line-height: 1;
    }
    .tag-remove:hover { opacity: 1; }

    /* Sidebar total count label */
    .sidebar-section-title {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      text-transform: uppercase;
      padding: 0 16px 14px;
    }

    /* Legacy – keep badge classes for right sidebar */
    .category-badge {
      font-family: var(--font-mono);
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 2px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .badge-top { background: rgba(201,168,76,0.1); color: var(--gold); }
    .badge-bottom { background: rgba(184,115,51,0.1); color: var(--accent); }
    .badge-outer { background: rgba(92,140,106,0.1); color: var(--success); }

    .upload-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 4px 16px 0;
      padding: 10px 16px;
      background: transparent;
      border: 1px dashed var(--border2);
      border-radius: 6px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
      width: calc(100% - 32px);
      justify-content: center;
    }
    .upload-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(201,168,76,0.04);
    }

    /* ---- MAIN ---- */
    .main {
      display: flex;
      flex-direction: column;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    .main-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
    }
    .toolbar-title {
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--cream-dim);
      font-family: var(--font-mono);
      text-transform: uppercase;
    }
    .toolbar-actions { display: flex; gap: 8px; }
    .btn {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      padding: 8px 18px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      text-transform: uppercase;
    }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--text-muted);
    }
    .btn-ghost:hover { border-color: var(--gold-dim); color: var(--cream-dim); }
    .btn-ghost:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      border-color: var(--border2);
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--gold-dim), var(--gold));
      color: var(--bg);
      font-weight: 500;
    }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      filter: none;
    }

    /* ---- CANVAS AREA ---- */
    .canvas-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Background grid */
    .canvas-area::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .avatar-stage {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeUp 0.5s 0.1s ease both;
    }

    .avatar-frame {
      width: 200px;
      height: 320px;
      border-radius: 100px 100px 60px 60px;
      border: 1px solid var(--border2);
      background: var(--surface);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: glowPulse 3s ease-in-out infinite;
    }

    .avatar-body {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Avatar silhouette drawn with CSS */
    .avatar-head {
      width: 70px; height: 70px;
      border-radius: 50%;
      background: linear-gradient(160deg, #3d3530, #2a2520);
      border: 1px solid var(--border2);
      margin-top: 28px;
      flex-shrink: 0;
      position: relative;
    }
    .avatar-head::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px; height: 12px;
      border-radius: 0 0 20px 20px;
      background: #2a2520;
    }

    .avatar-torso {
      width: 90px;
      flex: 1;
      margin-top: 6px;
      border-radius: 8px 8px 18px 18px;
      position: relative;
      background: var(--surface2);
      border: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.5s, border-color 0.3s;
    }

    .avatar-legs {
      display: flex;
      gap: 6px;
      width: 90px;
      margin-bottom: 10px;
    }
    .avatar-leg {
      flex: 1;
      height: 100px;
      border-radius: 4px 4px 10px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      transition: background 0.5s, border-color 0.3s;
    }

    /* Clothing overlay on avatar */
    .clothing-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .clothing-overlay.visible { opacity: 1; }

    /* Scan animation during try-on */
    .scan-line {
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      animation: scan 1.2s ease-in-out infinite;
      display: none;
      z-index: 5;
    }
    .scanning .scan-line { display: block; }

    .avatar-label {
      margin-top: 16px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* Outfit chips below avatar */
    .outfit-chips {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 280px;
    }
    .outfit-chip {
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .chip-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      animation: fadeUp 0.6s ease both;
    }
    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.3;
    }
    .empty-title {
      font-size: 20px;
      font-weight: 300;
      color: var(--cream-dim);
      letter-spacing: 0.05em;
    }
    .empty-sub {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    /* ---- SIDEBAR RIGHT ---- */
    .sidebar-right {
      border-left: 1px solid var(--border);
      background: var(--surface);
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      animation: fadeUp 0.4s 0.05s ease both;
    }

    .panel-title {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    /* Upload zone */
    .upload-zone {
      border: 1px dashed var(--border2);
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--gold);
      background: rgba(201,168,76,0.04);
    }
    .upload-zone input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }
    .upload-icon { font-size: 28px; margin-bottom: 8px; }
    .upload-text {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .upload-text strong { color: var(--gold); font-weight: 500; }

    /* Progress */
    .progress-bar {
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      overflow: hidden;
      margin-top: 8px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold));
      border-radius: 1px;
      transition: width 0.3s ease;
    }

    /* Analysis panel */
    .analysis-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    .analysis-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }
    .analysis-row:last-child { border-bottom: none; }
    .analysis-key {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .analysis-val {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--cream);
    }

    /* AI result */
    .tryon-result {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      overflow: hidden;
    }
    .tryon-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .tryon-title {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--cream);
      letter-spacing: 0.05em;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
    }
    .dot-idle { background: var(--border2); }
    .dot-processing { background: var(--gold); animation: pulse-ring 1s ease infinite; }
    .dot-done { background: var(--success); }

    .tryon-body { padding: 16px; }
    .tryon-preview {
      width: 100%;
      aspect-ratio: 3/4;
      background: var(--surface3);
      border-radius: 6px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      margin-bottom: 12px;
    }

    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border2);

    /* Modal overlay for upload */

    .divider {

    /* ---- Photo upload & BG removal styles ---- */
    @keyframes bgRemove {
      0%   { opacity: 1; }

    /* Photo drop zone inside modal */
    .photo-drop {

    /* Removed bg result */

    /* Card thumbnail with real photo */
    .card-thumb-img {
      width: 100%; height: 90px;

    /* Avatar clothing image overlays */

      position: absolute;

    .avatar-clothing-img.visible { opacity: 1; }

    }

    /* Right panel photo upload zone */
    .right-upload-zone {
      border: 1px dashed var(--border2);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      cursor: pointer;

      overflow: hidden;

    .right-upload-zone:hover { border-color: var(--gold); background: rgba(201,168,76,0.03); }
    .right-upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    @keyframes classifying {
      0%   { width: 0%; }
      40%  { width: 60%; }
      70%  { width: 82%; }
      100% { width: 100%; }
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.92) translateY(4px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes badgePop {
      0%   { transform: scale(0.7); opacity: 0; }

    /* Emoji picker grid */
    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      margin-top: 6px;
    }
    .emoji-btn {
      aspect-ratio: 1;
      border-radius: 8px;

      background: var(--surface2);
      font-size: 22px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      position: relative;
    }
    .emoji-btn:hover { border-color: var(--border2); background: var(--surface3); transform: scale(1.06); }
    .emoji-btn.active {
      border-color: var(--gold);
      background: rgba(201,168,76,0.08);
      box-shadow: 0 0 8px rgba(201,168,76,0.2);
    }

    /* AI classification result banner */
    .ai-classify-wrap {
      margin: 12px 0 4px;
      overflow: hidden;
    }
    .ai-classify-bar {
      height: 2px;

    .ai-result-banner.cat-bottom { border-color: rgba(184,115,51,0.35); background: rgba(184,115,51,0.07); }

    .ai-badge {
      font-family: var(--font-mono);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 3px 8px;
      border-radius: 3px;
      font-weight: 500;
      flex-shrink: 0;
      animation: badgePop 0.35s 0.1s ease both;
    }
    .ai-badge-top    { background: rgba(201,168,76,0.15); color: var(--gold); }
    .ai-badge-bottom { background: rgba(184,115,51,0.15); color: var(--accent); }
    .ai-badge-outer  { background: rgba(92,140,106,0.15); color: var(--success); }

    .ai-result-text {
      flex: 1;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--cream-dim);

    }

      font-family: var(--font-mono);

      flex-shrink: 0;
    }

    .ai-conf-bottom { color: var(--accent); }

    /* Override toggle in banner */
    .ai-override {
      display: flex;

    .ai-override-btn {
      font-family: var(--font-mono);

      color: var(--text-muted);

      text-transform: uppercase;
      letter-spacing: 0.06em;
      transition: all 0.15s;
    }
    .ai-override-btn:hover { border-color: var(--cream-dim); color: var(--cream-dim); }
    .ai-override-btn.active-top    { border-color: var(--gold);    color: var(--gold);    background: rgba(201,168,76,0.08); }
    .ai-override-btn.active-bottom { border-color: var(--accent);  color: var(--accent);  background: rgba(184,115,51,0.08); }
    .ai-override-btn.active-outer  { border-color: var(--success); color: var(--success); background: rgba(92,140,106,0.08); }

    /* Preview card destination */
    .preview-destination {
      margin-top: 12px;
      padding: 10px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      animation: popIn 0.3s 0.15s ease both;
      opacity: 0;
      animation-fill-mode: both;
    }
    .dest-arrow { color: var(--gold); font-size: 13px; }
    .dest-section {
      display: flex;

  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback, useMemo } = React;

    // ─────────────────────────────────────────────────────────────
    // BG REMOVAL via Canvas + Claude Vision API
    // Strategy: send image to Claude, get bounding box + dominant
    // colour of background, then use canvas to create a mask.
    // ─────────────────────────────────────────────────────────────
    async function removeBackground(imageDataUrl, onStep) {
      onStep('detect');

      try {
        // Convert dataURL to Blob
        const response = await fetch(imageDataUrl);
        const blob = await response.blob();

        // Create FormData and upload to backend
        const formData = new FormData();
        formData.append('file', blob, 'clothing.jpg');

        onStep('segment');

        // Call backend remove-background endpoint
        const removeRes = await fetch('/remove-background', {
          method: 'POST',
          body: formData
        });

        if (!removeRes.ok) {
          throw new Error(`Remove BG failed: ${removeRes.statusText}`);
        }

        const result = await removeRes.json();

        onStep('done');

        return {
          removedDataUrl: result.removed_bg,
          meta: {
            category: 'top', // Default category
            garmentName: 'Clothing Item'
          }
        };
      } catch (err) {
        console.error('Background removal error:', err);
        // Fallback: return original image
        return {
          removedDataUrl: imageDataUrl,
          meta: { category: 'top', garmentName: 'Clothing Item' }
        };
      }
    }

    // ─────────────────────────────────────────────────────────────
    // DATA
    // ─────────────────────────────────────────────────────────────
    const INITIAL_WARDROBE = [
      { id: 1, name: 'Silk Blouse',    category: 'top',    emoji: '👚', brand: 'Zara',     size: 'M',  photo: null, removedBg: null },
      { id: 2, name: 'Cotton Tee',     category: 'top',    emoji: '👕', brand: 'H&M',      size: 'M',  photo: null, removedBg: null },
      { id: 3, name: 'Knit Sweater',   category: 'top',    emoji: '🧥', brand: 'COS',      size: 'L',  photo: null, removedBg: null },
      { id: 4, name: 'Linen Blazer',   category: 'outer',  emoji: '🥼', brand: 'Massimo',  size: 'M',  photo: null, removedBg: null },
      { id: 5, name: 'Trench Coat',    category: 'outer',  emoji: '🧥', brand: 'Burberry', size: 'M',  photo: null, removedBg: null },
      { id: 6, name: 'Wool Trousers',  category: 'bottom', emoji: '👖', brand: 'Uniqlo',   size: '30', photo: null, removedBg: null },
      { id: 7, name: 'Midi Skirt',     category: 'bottom', emoji: '👗', brand: 'Mango',    size: 'S',  photo: null, removedBg: null },
      { id: 8, name: 'Slim Jeans',     category: 'bottom', emoji: '👖', brand: "Levi's",   size: '32', photo: null, removedBg: null },
    ];

    const CATEGORIES = [
      { key: 'top',    label: 'Tops',      dotClass: 'dot-top',    tagClass: 'tag-top',    selectedClass: 'selected-top'    },
      { key: 'outer',  label: 'Outerwear', dotClass: 'dot-outer',  tagClass: 'tag-outer',  selectedClass: 'selected-outer'  },
      { key: 'bottom', label: 'Bottoms',   dotClass: 'dot-bottom', tagClass: 'tag-bottom', selectedClass: 'selected-bottom' },
    ];

    // ─────────────────────────────────────────────────────────────
    // APP COMPONENT
    // ─────────────────────────────────────────────────────────────
    function App() {
      const [wardrobe, setWardrobe] = useState(INITIAL_WARDROBE);
      const [selected, setSelected] = useState({ top: null, outer: null, bottom: null, head: null });
      const [uploadModal, setUploadModal] = useState(false);
      const [toast, setToast] = useState(null);
      const [tryOnState, setTryOnState] = useState(null); // null | 'loading' | 'done'
      const [showRightPanel, setShowRightPanel] = useState(true);
      const fileInputRef = useRef(null);
      const [previewImage, setPreviewImage] = useState(null);
      const [removedBgImage, setRemovedBgImage] = useState(null);
      const [processingImage, setProcessingImage] = useState(false);
      const [itemForm, setItemForm] = useState({ name: '', category: 'top', brand: '', size: 'M', emoji: '👕' });
      const [avatarImage, setAvatarImage] = useState(null); // User's body/avatar image
      const [tryOnResultImage, setTryOnResultImage] = useState(null); // dataURL or URL

      const showToast = (msg) => {
        setToast(msg);
        setTimeout(() => setToast(null), 3000);
      };

      const handleFileUpload = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async (evt) => {
          const dataUrl = evt.target?.result;
          setPreviewImage(dataUrl);
          setProcessingImage(true);
          showToast('🔄 Processing image...');
          
          try {
            // Remove background using canvas
            const { removedDataUrl, meta } = await removeBackground(dataUrl, (step) => {
              console.log('Background removal step:', step);
            });
            
            setRemovedBgImage(removedDataUrl);
            // Auto-detect category if available
            if (meta?.category) {
              setItemForm(prev => ({...prev, category: meta.category}));
            }
            showToast('✓ Image processed! Fill in details and add.');
            setProcessingImage(false);
          } catch (err) {
            console.error('Error processing image:', err);
            showToast('Error processing image');
            setProcessingImage(false);
          }
        };
        reader.readAsDataURL(file);
      };

      const handleAddItem = () => {
        if (!previewImage) {
          showToast('Select image first');
          return;
        }
        if (!itemForm.name.trim()) {
          showToast('Enter item name');
          return;
        }

        const newItem = {
          id: Math.random(),
          name: itemForm.name,
          category: itemForm.category,
          emoji: itemForm.emoji,
          brand: itemForm.brand,
          size: itemForm.size,
          photo: previewImage,
          removedBg: removedBgImage,
        };
        
        setWardrobe([...wardrobe, newItem]);
        showToast('✓ Item added!');
        setUploadModal(false);
        setPreviewImage(null);
        setRemovedBgImage(null);
        setProcessingImage(false);
        setItemForm({ name: '', category: 'top', brand: '', size: 'M', emoji: '👕' });
      };

      const toggleItem = (item) => {
        setSelected(prev => ({
          ...prev,
          [item.category]: prev[item.category]?.id === item.id ? null : item
        }));
      };

      const deleteItem = (itemId) => {
        setWardrobe(wardrobe.filter(item => item.id !== itemId));
        // If deleted item was selected, deselect it
        setSelected(prev => {
          const updated = {...prev};
          Object.keys(updated).forEach(cat => {
            if (updated[cat]?.id === itemId) updated[cat] = null;
          });
          return updated;
        });
        showToast('✓ Item deleted');
      };

      const selectedOutfit = Object.values(selected).filter(Boolean);

      const generateTryOn = async () => {
        if (!avatarImage) {
          showToast('Upload your body photo first');
          return;
        }
        if (!selected.top && !selected.bottom && !selected.outer) {
          showToast('Select items first');
          return;
        }

        setTryOnState('loading');
        setTryOnResultImage(null);
        showToast('🔄 Generating try-on...');

        try {
          // Prepare payload for API
          const payload = {
            avatar_image_base64: avatarImage
          };

          // Add selected clothing items
          if (selected.top) {
            payload.top_image_base64 = selected.top.removedBg || selected.top.photo;
            payload.top_name = selected.top.name;
          }
          if (selected.bottom) {
            payload.bottom_image_base64 = selected.bottom.removedBg || selected.bottom.photo;
            payload.bottom_name = selected.bottom.name;
          }
          if (selected.outer) {
            payload.outer_image_base64 = selected.outer.removedBg || selected.outer.photo;
            payload.outer_name = selected.outer.name;
          }

          // Send request to backend
          const response = await fetch('http://localhost:8000/generate-tryon', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }

          const result = await response.json();

          if (result.preview_url) {
            // Display the result
            setTryOnState('done');
            showToast('✓ Try-on generated!');

            // Prefer base64 dataURL when available (avoids CORS/hotlink issues)
            setTryOnResultImage(result.preview_image_data_url || result.preview_url);
          } else {
            throw new Error(result.error || 'Failed to generate try-on');
          }

        } catch (err) {
          console.error('Error generating try-on:', err);
          showToast('❌ Error generating try-on');
          setTryOnState(null);
          setTryOnResultImage(null);
        }
      };

      return (
        <div className="app">
          {/* HEADER */}
          <div className="header">
            <div className="header-logo">WARDROBE<span>.AI</span></div>
            <div className="header-nav">
              <a href="#" className="active">Studio</a>
              <a href="#">History</a>
              <a href="#">Settings</a>
            </div>
            <div className="header-user">
              <span>Dinmukhammed</span>
              <div className="avatar">D</div>
            </div>
          </div>

          {/* SIDEBAR LEFT */}
          <div className="sidebar-left">
            {CATEGORIES.map(cat => (
              <div key={cat.key}>
                <div className="category-section">
                  <div className="category-header">
                    <div className="category-label">
                      <div className={`category-dot ${cat.dotClass}`}></div>
                      {cat.label}
                    </div>
                    <div className="category-count">{wardrobe.filter(w => w.category === cat.key).length}</div>
                  </div>
                  <div className="h-scroll-track">
                    {wardrobe.filter(w => w.category === cat.key).map(item => (
                      <div
                        key={item.id}
                        className={`card-item ${selected[cat.key]?.id === item.id ? cat.selectedClass : ''}`}
                        onClick={() => toggleItem(item)}
                        title={item.name}
                      >
                        <div className="card-check">✓</div>
                        <div className="card-delete" onClick={(e) => { e.stopPropagation(); deleteItem(item.id); }}>✕</div>
                        <div className="card-thumb">
                          {item.removedBg ? (
                            <img src={item.removedBg} style={{width: '100%', height: '100%', objectFit: 'contain'}} />
                          ) : item.photo ? (
                            <img src={item.photo} style={{width: '100%', height: '100%', objectFit: 'cover'}} />
                          ) : (
                            item.emoji
                          )}
                        </div>
                        <div className="card-body">
                          <div className="card-name">{item.name}</div>
                          <div className="card-meta">{item.brand || 'Custom'}</div>
                        </div>
                      </div>
                    ))}
                    <div className="card-add" onClick={() => setUploadModal(true)}>
                      <div className="card-add-icon">+</div>
                      <div>Add</div>
                    </div>
                  </div>
                </div>
                {CATEGORIES.indexOf(cat) < CATEGORIES.length - 1 && <div className="cat-divider"></div>}
              </div>
            ))}

            {selectedOutfit.length > 0 && (
              <div className="outfit-summary">
                <div className="outfit-summary-title">Selected Outfit</div>
                <div className="outfit-summary-items">
                  {selectedOutfit.map(item => (
                    <div key={item.id} className={`outfit-tag ${item.category === 'top' ? 'tag-top' : item.category === 'bottom' ? 'tag-bottom' : 'tag-outer'}`}>
                      {item.emoji} {item.name?.substring(0, 10)}
                      <span className="tag-remove" onClick={() => setSelected(p => ({...p, [item.category]: null}))}>×</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>

          {/* MAIN CANVAS */}
          <div className="main">
            <div className="main-toolbar">
              <div className="toolbar-title">Virtual Try-On Studio</div>
              <div className="toolbar-actions">
                <button className="btn btn-ghost" onClick={() => setSelected({ top: null, outer: null, bottom: null, head: null })}>Clear</button>
                <button className="btn btn-primary" disabled={selectedOutfit.length === 0} onClick={generateTryOn}>
                  {tryOnState === 'loading' ? '🔄 Generating...' : 'Generate Try-On'}
                </button>
                <button className="btn btn-ghost" onClick={() => setShowRightPanel(!showRightPanel)} title={showRightPanel ? 'Hide Panel' : 'Show Panel'}>
                  {showRightPanel ? '▶' : '◀'}
                </button>
              </div>
            </div>
            <div className="canvas-area">
              {selectedOutfit.length === 0 ? (
                <div className="empty-state">
                  <div className="empty-icon">👗</div>
                  <div className="empty-title">Select Items to Try</div>
                  <div className="empty-sub">Choose clothing from the left to see your virtual try-on</div>
                </div>
              ) : (
                <div className="avatar-stage">
                  <div className={`avatar-frame ${tryOnState === 'loading' ? 'scanning' : ''}`}>
                    {tryOnState === 'loading' && <div className="scan-line"></div>}
                    <div className="avatar-body">
                      <div className="avatar-head">
                        {selected.head && (
                          <div className="clothing-overlay visible" style={{fontSize: '50px'}}>
                            {selected.head.emoji}
                          </div>
                        )}
                      </div>
                      <div className="avatar-torso">
                        {selected.top && (
                          <div className="avatar-top-img visible">
                            {selected.top.removedBg ? (
                              <img src={selected.top.removedBg} style={{height: '100%', objectFit: 'contain'}} />
                            ) : (
                              <div style={{fontSize: '40px'}}>{selected.top.emoji}</div>
                            )}
                          </div>
                        )}
                        {selected.outer && (
                          <div className="avatar-outer-img visible">
                            {selected.outer.removedBg ? (
                              <img src={selected.outer.removedBg} style={{height: '100%', objectFit: 'contain'}} />
                            ) : (
                              <div style={{fontSize: '38px'}}>{selected.outer.emoji}</div>
                            )}
                          </div>
                        )}
                      </div>
                      <div className="avatar-legs">
                        <div className="avatar-leg"></div>
                        <div className="avatar-leg"></div>
                        {selected.bottom && (
                          <div className="avatar-bottom-img visible">
                            {selected.bottom.removedBg ? (
                              <img src={selected.bottom.removedBg} style={{height: '100%', objectFit: 'contain'}} />
                            ) : (
                              <div style={{fontSize: '32px', position: 'absolute', bottom: '5px'}}>{selected.bottom.emoji}</div>
                            )}
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                  <div className="outfit-chips">
                    {selectedOutfit.map(item => (
                      <div key={item.id} className="outfit-chip">
                        <div className="chip-dot"></div>
                        {item.name?.substring(0, 12)}
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>

          {/* SIDEBAR RIGHT */}
          {showRightPanel && (
            <div className="sidebar-right">
              <div>
                <div className="panel-title">Your Body Photo</div>
                {avatarImage ? (
                  <div style={{marginBottom: '16px'}}>
                    <img src={avatarImage} style={{width: '100%', borderRadius: '8px', marginBottom: '8px'}} />
                    <button className="btn btn-ghost" onClick={() => setAvatarImage(null)} style={{width: '100%'}}>
                      Remove Photo
                    </button>
                  </div>
                ) : (
                  <button className="upload-btn" onClick={() => document.getElementById('avatar-input').click()} style={{marginBottom: '16px'}}>
                    📸 Upload Body Photo
                  </button>
                )}
                <input
                  id="avatar-input"
                  type="file"
                  accept="image/*"
                  style={{display: 'none'}}
                  onChange={(e) => {
                    const file = e.target.files?.[0];
                    if (file) {
                      const reader = new FileReader();
                      reader.onload = (e) => setAvatarImage(e.target.result);
                      reader.readAsDataURL(file);
                    }
                  }}
                />
              </div>

              <div>
                <div className="panel-title">Upload Clothing</div>
                <button className="upload-btn" onClick={() => setUploadModal(true)} style={{marginBottom: '16px'}}>📸 Upload Photo</button>
              </div>

              {selectedOutfit.length > 0 && (
                <div>
                  <div className="panel-title">Using Items</div>
                  <div className="analysis-card">
                    <div className="analysis-row">
                      <span className="analysis-key">Top</span>
                      <span className="analysis-val">{selected.top?.name?.substring(0, 12) || '—'}</span>
                    </div>
                    <div className="analysis-row">
                      <span className="analysis-key">Bottom</span>
                      <span className="analysis-val">{selected.bottom?.name?.substring(0, 12) || '—'}</span>
                    </div>
                    {selected.outer && (
                      <div className="analysis-row">
                        <span className="analysis-key">Outer</span>
                        <span className="analysis-val">{selected.outer?.name?.substring(0, 12)}</span>
                      </div>
                    )}
                  </div>
                </div>
              )}

              {tryOnState === 'done' && (
                <div>
                  <div className="panel-title">Try-On Result</div>
                  <div className="tryon-result">
                    <div className="tryon-header">
                      <div className="tryon-title">AI Generated</div>
                      <div className="status-dot dot-done"></div>
                    </div>
                    <div className="tryon-body">
                      <div className="tryon-preview">
                        {tryOnResultImage ? (
                          <img
                            src={tryOnResultImage}
                            alt="Try-on result"
                            style={{width: '100%', height: '100%', objectFit: 'cover'}}
                          />
                        ) : (
                          <div style={{fontSize: '32px', textAlign: 'center'}}>
                            {selected.top?.emoji} {selected.bottom?.emoji} {selected.outer?.emoji}
                          </div>
                        )}
                      </div>
                      <div className="score-row">
                        <span className="score-label">Fit Score</span>
                        <div className="score-bar">
                          <div className="score-fill" style={{width: '85%'}}></div>
                        </div>
                        <span className="score-num">85</span>
                      </div>
                      <div className="score-row">
                        <span className="score-label">Style Score</span>
                        <div className="score-bar">
                          <div className="score-fill" style={{width: '92%'}}></div>
                        </div>
                        <span className="score-num">92</span>
                      </div>
                      <div className="score-row">
                        <span className="score-label">Confidence</span>
                        <div className="score-bar">
                          <div className="score-fill" style={{width: '88%'}}></div>
                        </div>
                        <span className="score-num">88</span>
                      </div>
                    </div>
                  </div>
                  <button className="btn btn-ghost" onClick={() => setTryOnState(null)} style={{width: '100%', marginTop: '10px'}}>
                    Clear Result
                  </button>
                </div>
              )}
            </div>
          )}

          {/* UPLOAD MODAL */}
          {uploadModal && (
            <div className="modal-bg" onClick={() => {
              if (!processingImage) setUploadModal(false);
            }}>
              <div className="modal" onClick={(e) => e.stopPropagation()}>
                <div className="modal-title">Add Clothing Item</div>
                <div className="modal-sub">Upload a photo and fill in details</div>
                
                <div className="photo-drop">
                  <input type="file" accept="image/*" onChange={handleFileUpload} />
                  {previewImage ? (
                    <div className="photo-preview-wrap">
                      <img src={previewImage} className="photo-preview-img" />
                      {processingImage && (
                        <div style={{position: 'absolute', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '8px'}}>
                          <div className="spinner"></div>
                          <div style={{fontSize: '11px', color: 'var(--gold)'}}>Processing...</div>
                        </div>
                      )}
                    </div>
                  ) : (
                    <div className="photo-drop-placeholder">
                      <div className="pd-icon">📸</div>
                      <div className="pd-text">Drop photo here or <strong>click</strong></div>
                    </div>
                  )}
                </div>

                <div className="form-field">
                  <label className="form-label">Item Name</label>
                  <input
                    className="form-input"
                    placeholder="e.g., Blue Silk Blouse"
                    value={itemForm.name}
                    onChange={(e) => setItemForm({...itemForm, name: e.target.value})}
                  />
                </div>

                <div className="form-field">
                  <label className="form-label">Category</label>
                  <select
                    className="form-select"
                    value={itemForm.category}
                    onChange={(e) => setItemForm({...itemForm, category: e.target.value})}
                  >
                    <option value="top">Top</option>
                    <option value="bottom">Bottom</option>
                    <option value="outer">Outerwear</option>
                    <option value="head">Head/Hat</option>
                  </select>
                </div>

                <div className="form-field">
                  <label className="form-label">Brand</label>
                  <input
                    className="form-input"
                    placeholder="e.g., Zara"
                    value={itemForm.brand}
                    onChange={(e) => setItemForm({...itemForm, brand: e.target.value})}
                  />
                </div>

                <div className="form-field">
                  <label className="form-label">Size</label>
                  <input
                    className="form-input"
                    placeholder="e.g., M"
                    value={itemForm.size}
                    onChange={(e) => setItemForm({...itemForm, size: e.target.value})}
                  />
                </div>

                <div className="modal-actions">
                  <button className="btn btn-ghost" onClick={() => {
                    setUploadModal(false);
                    setPreviewImage(null);
                    setRemovedBgImage(null);
                    setProcessingImage(false);
                    setItemForm({ name: '', category: 'top', brand: '', size: 'M', emoji: '👕' });
                  }} disabled={processingImage}>Cancel</button>
                  <button className="btn btn-primary" onClick={handleAddItem} disabled={!previewImage || !itemForm.name || processingImage}>
                    {processingImage ? '🔄 Processing...' : 'Add Item'}
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* TOAST */}
          {toast && <div className="toast"><div className="toast-icon">✓</div> {toast}</div>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
